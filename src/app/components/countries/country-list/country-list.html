<div class="container mx-auto px-4 py-8">

    <div class="mb-10 flex flex-col items-center justify-end gap-4 sm:flex-row bg-transparent">
        <div class="relative w-full max-w-md">
            <div class="pointer-events-none absolute inset-y-0 inset-s-0 flex items-center ps-3">
                <svg class="h-4 w-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2"
                        d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
                </svg>
            </div>

            <input type="text" [value]="searchTerm()" (input)="searchTerm.set($any($event.target).value)"
                placeholder="Search by country or capital..."
                class="w-full rounded-lg border border-slate-300 bg-white py-2.5 pe-4 ps-10 text-sm text-slate-900 shadow-sm outline-none transition-all focus:border-indigo-500 focus:ring-2 focus:ring-indigo-500/20" />
        </div>
    </div>

    @if (isLoading()) {
    <div class="flex h-64 items-center justify-center">
        <div class="h-12 w-12 animate-spin rounded-full border-4 border-slate-200 border-t-indigo-600"></div>
    </div>
    }

    @if (errorMessage()) {
    <div class="rounded-xl bg-red-50 p-4 text-sm text-red-600 dark:bg-red-900/30 dark:text-red-400">
        {{ errorMessage() }}
    </div>
    }

    @if (!isLoading() && !errorMessage()) {
    <div class="grid grid-cols-1 gap-6 justify-items-center sm:grid-cols-2 md:grid-cols-3 lg:grid-cols-4">
        @for (country of filteredCountries(); track country.name.common) {
        <app-country-detail [country]="country" class="w-full max-w-sm" />
        } @empty {
        <div class="col-span-full py-12 text-center">
            <p class="text-lg font-medium text-slate-400">No countries match your search.</p>
        </div>
        }
    </div>
    }
</div>
