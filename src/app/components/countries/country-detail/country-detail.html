<div class="bg-white border border-gray-200 rounded-xl p-6 shadow-sm sticky top-6">
  <div class="space-y-6">
    <div class="aspect-video w-full overflow-hidden rounded-lg bg-gray-50 border border-gray-100">
      @if (country().name.common === 'Afghanistan') {
        <div class="text-center text-gray-400 p-4">
          <span class="text-3xl block mb-1">🏳️</span>
          <p class="text-xs font-medium">No Flag Available</p>
        </div>
      } @else {
        <img [src]="country().flags.png" [alt]="country().flags.alt" class="w-full h-full object-cover"/>
      }
    </div>

    <div class="border-t border-gray-100 pt-4 space-y-3">
      <div class="flex justify-between py-2 border-b border-gray-50 text-sm">
        <span class="text-gray-500">Name</span>
        <span class="font-medium text-gray-800">{{ country().name.common }}</span>
      </div>
      <div class="flex justify-between py-2 border-b border-gray-50 text-sm">
        <span class="text-gray-500">Capital</span>
        <span class="font-medium text-gray-800">{{ country().capital[0] }}</span>
      </div>
    </div>
  </div>
</div>
